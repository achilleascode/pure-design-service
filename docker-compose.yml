services:
  pure-design:
    build: .
    image: pure-design-service:latest
    container_name: pure-design
    restart: unless-stopped
    ports:
      - "8090:8000"
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      FAST_MODE: ${FAST_MODE:-0}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-}
      SQLITE_PATH: /data/pure-design.db
    volumes:
      - pure-design-data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  pure-design-data:
