<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Pure Design Generator – Mock</title>
<style>
  :root {
    --bg: #0e0e10;
    --panel: #17171a;
    --panel-2: #1f1f23;
    --text: #f5f5f7;
    --muted: #9c9ca6;
    --accent: #c43232;
    --accent-2: #ff7a7a;
    --border: #2b2b30;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", Inter, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  header {
    padding: 28px 32px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: baseline;
    gap: 16px;
  }
  header h1 { margin: 0; font-size: 20px; letter-spacing: -0.01em; }
  header .subtitle { color: var(--muted); font-size: 13px; }
  main {
    display: grid;
    grid-template-columns: minmax(360px, 1fr) minmax(0, 1.6fr);
    gap: 24px;
    padding: 24px 32px;
    max-width: 1400px;
    margin: 0 auto;
  }
  @media (max-width: 900px) { main { grid-template-columns: 1fr; } }
  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
  }
  .chat {
    display: flex;
    flex-direction: column;
    height: 75vh;
  }
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 18px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .msg {
    max-width: 92%;
    padding: 12px 14px;
    border-radius: 12px;
    line-height: 1.45;
    font-size: 14px;
  }
  .msg.bot { background: var(--panel-2); align-self: flex-start; }
  .msg.user { background: var(--accent); color: white; align-self: flex-end; }
  .msg.system { background: transparent; color: var(--muted); font-size: 12px; align-self: center; }
  .msg img {
    display: block;
    width: 100%;
    max-width: 420px;
    border-radius: 8px;
    margin-top: 10px;
    border: 1px solid var(--border);
  }
  .msg .meta { color: var(--muted); font-size: 11px; margin-top: 6px; }
  .composer {
    border-top: 1px solid var(--border);
    padding: 14px;
    display: flex;
    gap: 10px;
    background: var(--panel-2);
  }
  .composer textarea {
    flex: 1;
    resize: none;
    background: var(--panel);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    font-family: inherit;
    font-size: 14px;
    min-height: 44px;
    max-height: 120px;
  }
  .composer button {
    background: var(--accent);
    color: white;
    border: 0;
    border-radius: 10px;
    padding: 0 20px;
    font-weight: 600;
    cursor: pointer;
    transition: background .15s;
  }
  .composer button:hover:not(:disabled) { background: var(--accent-2); }
  .composer button:disabled { opacity: .5; cursor: not-allowed; }
  .history h2 { margin: 0; padding: 16px 18px; font-size: 14px; color: var(--muted); border-bottom: 1px solid var(--border); font-weight: 500; }
  .history-grid {
    padding: 14px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 10px;
    max-height: calc(75vh - 50px);
    overflow-y: auto;
  }
  .history-item {
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    cursor: pointer;
    transition: transform .15s, border-color .15s;
  }
  .history-item:hover { transform: translateY(-2px); border-color: var(--accent); }
  .history-item img { width: 100%; aspect-ratio: 4/5; object-fit: cover; display: block; background: var(--panel); }
  .history-item .h-prompt { padding: 8px; font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .badge { font-size: 11px; padding: 2px 8px; border-radius: 99px; }
  .badge.done { background: #1c3a1e; color: #7adf80; }
  .badge.failed { background: #3a1c1c; color: #ff8484; }
  .badge.rejected { background: #3a361c; color: #ffd84a; }
  .loader { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--muted); border-top-color: var(--accent-2); border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<header>
  <h1>Pure Design Generator</h1>
  <span class="subtitle">Mock-Chat · Gemini 3.1 Flash Image + Brand-Composite</span>
</header>

<main>
  <section class="panel chat">
    <div class="messages" id="messages">
      <div class="msg bot">Hallo! Beschreibe ein Motiv für dein Pure-Cannabis-Mockup (z.&nbsp;B. „neon cyberpunk botanical with violet glow“).</div>
    </div>
    <form class="composer" id="composer">
      <textarea id="prompt" name="prompt" placeholder="Dein Designvorschlag..." required></textarea>
      <button type="submit" id="send">Generieren</button>
    </form>
  </section>

  <section class="panel history">
    <h2>Letzte Mockups</h2>
    <div class="history-grid" id="history"></div>
  </section>
</main>

<script>
const messages = document.getElementById("messages");
const composer = document.getElementById("composer");
const prompt = document.getElementById("prompt");
const sendBtn = document.getElementById("send");
const historyEl = document.getElementById("history");

function escapeHtml(s){return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));}

function addMsg(role, html) {
  const div = document.createElement("div");
  div.className = `msg ${role}`;
  div.innerHTML = html;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
  return div;
}

async function loadHistory() {
  try {
    const r = await fetch("/api/jobs");
    if (!r.ok) return;
    const { jobs } = await r.json();
    historyEl.innerHTML = "";
    for (const j of jobs) {
      const card = document.createElement("div");
      card.className = "history-item";
      const img = j.has_image
        ? `<img src="/api/image?id=${j.id}" loading="lazy" />`
        : `<div style="aspect-ratio:4/5;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:11px;">${j.status}</div>`;
      card.innerHTML = `${img}<div class="h-prompt" title="${escapeHtml(j.user_prompt)}">${escapeHtml(j.user_prompt)}</div>`;
      card.onclick = () => {
        if (j.has_image) {
          window.open(`/api/image?id=${j.id}`, "_blank");
        }
      };
      historyEl.appendChild(card);
    }
  } catch {}
}

composer.addEventListener("submit", async (e) => {
  e.preventDefault();
  const text = prompt.value.trim();
  if (!text) return;
  prompt.value = "";
  sendBtn.disabled = true;
  addMsg("user", escapeHtml(text));
  const thinking = addMsg("bot", '<span class="loader"></span> generiere…');
  const t0 = performance.now();
  try {
    const r = await fetch("/api/generate", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ prompt: text }),
    });
    const data = await r.json();
    thinking.remove();
    const dt = Math.round(performance.now() - t0);
    if (data.status === "done" && data.image_url) {
      addMsg("bot",
        `Fertig in ${dt} ms (${data.attempts} Versuch${data.attempts > 1 ? "e" : ""})<br/>` +
        `<img src="${data.image_url}" alt="Mockup" />` +
        `<div class="meta">job ${data.job_id?.slice(0,8) || ""}</div>`
      );
    } else if (data.status === "rejected") {
      addMsg("bot",
        `<span class="badge rejected">abgelehnt</span> ${escapeHtml(data.reason || "")}<br/>` +
        `<div class="meta">Kategorie: ${escapeHtml(data.category || "")}</div>`
      );
    } else {
      addMsg("bot",
        `<span class="badge failed">fehlgeschlagen</span> ${escapeHtml(data.reason || data.error || "unknown")}<br/>` +
        `<div class="meta">job ${data.job_id?.slice(0,8) || ""}</div>`
      );
    }
  } catch (err) {
    thinking.remove();
    addMsg("bot", `<span class="badge failed">Fehler</span> ${escapeHtml(err.message)}`);
  } finally {
    sendBtn.disabled = false;
    prompt.focus();
    loadHistory();
  }
});

loadHistory();
setInterval(loadHistory, 15000);
</script>
</body>
</html>
